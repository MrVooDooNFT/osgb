<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KOCAELİ OSGB Teklif Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    cursor:pointer;
}

.hidden{
    display:none;
}

.offer{
    background:white;
    color:black;
    padding:40px;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid black;
}

th,td{
    padding:10px;
    text-align:left;
}

</style>
</head>
<body>

<div class="container">

<h2>KOCAELİ OSGB Teklif Sistemi</h2>

<select id="mainType">
    <option value="">Teklif Türü Seçin</option>
    <option value="service">Hizmet Teklifi</option>
    <option value="health">Tahlil Teklifi</option>
</select>

<div id="serviceArea" class="hidden">

    <input type="text" id="serviceFirma" placeholder="Firma Adı">

    <select id="dangerClass">
        <option value="">Tehlike Sınıfı</option>
        <option value="az">Az Tehlikeli</option>
        <option value="tehlikeli">Tehlikeli</option>
        <option value="cok">Çok Tehlikeli</option>
    </select>

    <input type="number" id="serviceCount" placeholder="Çalışan Sayısı">

    <button onclick="createServiceOffer()">
        Hizmet Teklifi Oluştur
    </button>

</div>

<div id="healthArea" class="hidden">

    <select id="healthType">
        <option value="">Seçim Yapın</option>
        <option value="company">Şirket</option>
        <option value="person">Şahıs</option>
    </select>

    <div id="companyArea" class="hidden">

        <input type="text" id="healthFirma" placeholder="Firma Adı">

        <input type="number" id="healthCount" placeholder="Çalışan Sayısı">

        <h3 style="margin-top:20px;">Testler</h3>

        <div id="companyTests"></div>

        <button onclick="createCompanyHealthOffer()">
            Teklif Oluştur
        </button>

    </div>

    <div id="personArea" class="hidden">

        <input type="text" id="personName" placeholder="Ad Soyad">

        <h3 style="margin-top:20px;">Testler</h3>

        <div id="personTests"></div>

        <button onclick="createPersonOffer()">
            Şahıs Teklifi Oluştur
        </button>

    </div>

</div>

<div id="offerPreview" class="offer hidden"></div>

<button id="pdfButton" class="hidden" onclick="downloadPDF()">
PDF İndir
</button>

</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1ZMFPlQMFzsPzVxFTEJUPVorKZQwmX6hv/export?format=csv";

let PRICES = {};

const TEST_KEYS = [
    ["EKG","test_ekg"],
    ["SFT","test_sft"],
    ["Oidio","test_oidio"],
    ["Hemogram","test_hemogram"],
    ["Akciğer","test_akciger"],
    ["TİT","test_tit"],
    ["AKŞ","test_aks"],
    ["Üre","test_ure"],
    ["Kreatinin","test_kreatinin"],
    ["AST","test_ast"],
    ["ALT","test_alt"],
    ["HBS AG","test_hbsag"],
    ["Anti HBS","test_antihbs"],
    ["Anti HIV","test_antihiv"],
    ["Tetanoz","test_tetanoz"],
    ["Portör","test_portor"]
];

async function loadPrices(){

    const response = await fetch(SHEET_URL);

    const text = await response.text();

    const rows = text.split("\n");

    rows.slice(1).forEach(row=>{

        const cols = row.split(",");

        if(cols.length >= 2){

            PRICES[cols[0].trim()] =
            Number(cols[1].trim());

        }

    });

    createTests();

}

function createTests(){

    let html = "";

    TEST_KEYS.forEach(test=>{

        html += `
        <label>
        <input type="checkbox"
        class="testItem"
        data-key="${test[1]}"
        value="${test[1]}">
        ${test[0]}
        </label><br>
        `;

    });

    document.getElementById("companyTests").innerHTML = html;

    document.getElementById("personTests").innerHTML = html;

}

loadPrices();

const mainType =
document.getElementById("mainType");

const serviceArea =
document.getElementById("serviceArea");

const healthArea =
document.getElementById("healthArea");

mainType.addEventListener("change",function(){

    serviceArea.classList.add("hidden");
    healthArea.classList.add("hidden");

    if(this.value === "service"){
        serviceArea.classList.remove("hidden");
    }

    if(this.value === "health"){
        healthArea.classList.remove("hidden");
    }

});

document.getElementById("healthType")
.addEventListener("change",function(){

    document.getElementById("companyArea")
    .classList.add("hidden");

    document.getElementById("personArea")
    .classList.add("hidden");

    if(this.value === "company"){
        document.getElementById("companyArea")
        .classList.remove("hidden");
    }

    if(this.value === "person"){
        document.getElementById("personArea")
        .classList.remove("hidden");
    }

});

function createServiceOffer(){

    const firma =
    document.getElementById("serviceFirma").value;

    const danger =
    document.getElementById("dangerClass").value;

    const count =
    Number(document.getElementById("serviceCount").value);

    let base = 0;
    let extra = 0;

    let uzman = 0;
    let hekim = 0;

    let dangerText = "";

    if(danger === "az"){

        base = PRICES["hizmet_az_tehlikeli_sabit"];
        extra = PRICES["hizmet_az_tehlikeli_ek"];

        uzman = 10;
        hekim = 5;

        dangerText = "Az Tehlikeli";

    }

    if(danger === "tehlikeli"){

        base = PRICES["hizmet_tehlikeli_sabit"];
        extra = PRICES["hizmet_tehlikeli_ek"];

        uzman = 20;
        hekim = 10;

        dangerText = "Tehlikeli";

    }

    if(danger === "cok"){

        base = PRICES["hizmet_cok_tehlikeli_sabit"];
        extra = PRICES["hizmet_cok_tehlikeli_ek"];

        uzman = 40;
        hekim = 15;

        dangerText = "Çok Tehlikeli";

    }

    let total = base;

    if(count > 5){

        total +=
        (count - 5) * extra;

    }

    const uzmanSure =
    count * uzman;

    const hekimSure =
    count * hekim;

    const year =
    new Date().getFullYear();

    document.getElementById("offerPreview")
    .innerHTML = `

    <h1>İŞ SAĞLIĞI VE GÜVENLİĞİ HİZMET TEKLİFİ</h1>

    <table>

    <tr>
    <th>Firma</th>
    <td>${firma}</td>
    </tr>

    <tr>
    <th>Tehlike Sınıfı</th>
    <td>${dangerText}</td>
    </tr>

    <tr>
    <th>Çalışan Sayısı</th>
    <td>${count}</td>
    </tr>

    <tr>
    <th>Uzman Süresi</th>
    <td>${uzmanSure} dk</td>
    </tr>

    <tr>
    <th>Hekim Süresi</th>
    <td>${hekimSure} dk</td>
    </tr>

    <tr>
    <th>Aylık Ücret</th>
    <td>${total} TL</td>
    </tr>

    <tr>
    <th>Geçerlilik</th>
    <td>31/12/${year}</td>
    </tr>

    </table>
    `;

    showPreview();

}

function createCompanyHealthOffer(){

    const firma =
    document.getElementById("healthFirma").value;

    const count =
    Number(document.getElementById("healthCount").value);

    const checked =
    document.querySelectorAll(
    "#companyArea .testItem:checked"
    );

    const selectedCount =
    checked.length;

    let personPrice = 0;

    if(count < 10){

        personPrice =
        PRICES["paket_" + selectedCount + "_test"] || 0;

    }else{

        checked.forEach(item=>{

            personPrice +=
            PRICES[item.dataset.key];

        });

    }

    const total =
    personPrice * count;

    const date = new Date();

    date.setMonth(date.getMonth() + 1);

    const finalDate =
    date.toLocaleDateString("tr-TR");

    document.getElementById("offerPreview")
    .innerHTML = `

    <h1>İŞ SAĞLIĞI VE GÜVENLİĞİ TAHLİL TEKLİFİ</h1>

    <table>

    <tr>
    <th>Firma</th>
    <td>${firma}</td>
    </tr>

    <tr>
    <th>Çalışan Sayısı</th>
    <td>${count}</td>
    </tr>

    <tr>
    <th>Kişi Başı Ücret</th>
    <td>${personPrice} TL</td>
    </tr>

    <tr>
    <th>Toplam Tutar</th>
    <td>${total} TL</td>
    </tr>

    <tr>
    <th>Geçerlilik</th>
    <td>${finalDate}</td>
    </tr>

    </table>
    `;

    showPreview();

}

function createPersonOffer(){

    const name =
    document.getElementById("personName").value;

    const checked =
    document.querySelectorAll(
    "#personArea .testItem:checked"
    );

    const selectedCount =
    checked.length;

    let total = 0;

    if(selectedCount <= 7){

        total =
        PRICES["paket_" + selectedCount + "_test"] || 0;

    }else{

        checked.forEach(item=>{

            total +=
            PRICES[item.dataset.key];

        });

    }

    const date = new Date();

    date.setMonth(date.getMonth() + 1);

    const finalDate =
    date.toLocaleDateString("tr-TR");

    document.getElementById("offerPreview")
    .innerHTML = `

    <h1>ŞAHIS SAĞLIK TEKLİFİ</h1>

    <table>

    <tr>
    <th>Ad Soyad</th>
    <td>${name}</td>
    </tr>

    <tr>
    <th>Seçilen Test Sayısı</th>
    <td>${selectedCount}</td>
    </tr>

    <tr>
    <th>Toplam Tutar</th>
    <td>${total} TL</td>
    </tr>

    <tr>
    <th>Geçerlilik</th>
    <td>${finalDate}</td>
    </tr>

    </table>
    `;

    showPreview();

}

function showPreview(){

    document.getElementById("offerPreview")
    .classList.remove("hidden");

    document.getElementById("pdfButton")
    .classList.remove("hidden");

}

async function downloadPDF(){

    const element =
    document.getElementById("offerPreview");

    const canvas =
    await html2canvas(element,{
        scale:2
    });

    const imgData =
    canvas.toDataURL("image/png");

    const { jsPDF } =
    window.jspdf;

    const pdf =
    new jsPDF("p","mm","a4");

    const pdfWidth =
    pdf.internal.pageSize.getWidth();

    const pdfHeight =
    (canvas.height * pdfWidth)
    / canvas.width;

    pdf.addImage(
        imgData,
        "PNG",
        0,
        0,
        pdfWidth,
        pdfHeight
    );

    pdf.save("teklif.pdf");

}

</script>

</body>
</html>
