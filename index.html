<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KOCAELİ OSGB Teklif Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    cursor:pointer;
}

.hidden{
    display:none;
}

.offer{
    background:white;
    color:black;
    padding:40px;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid black;
}

th,td{
    padding:10px;
    text-align:left;
}

h1,h2,h3{
    margin:0;
}

</style>
</head>
<body>

<div class="container">

<h2>KOCAELİ OSGB Teklif Sistemi</h2>

<select id="mainType">
    <option value="">Teklif Türü Seçin</option>
    <option value="service">Hizmet Teklifi</option>
    <option value="health">Tahlil Teklifi</option>
</select>

<div id="serviceArea" class="hidden">

    <input type="text" id="serviceFirma" placeholder="Firma Adı">

    <select id="dangerClass">
        <option value="">Tehlike Sınıfı</option>
        <option value="az">Az Tehlikeli</option>
        <option value="tehlikeli">Tehlikeli</option>
        <option value="cok">Çok Tehlikeli</option>
    </select>

    <input type="number" id="serviceCount" placeholder="Çalışan Sayısı">

    <button onclick="createServiceOffer()">
        Hizmet Teklifi Oluştur
    </button>

</div>

<div id="healthArea" class="hidden">

    <select id="healthType">
        <option value="">Seçim Yapın</option>
        <option value="company">Şirket</option>
        <option value="person">Şahıs</option>
    </select>

    <div id="companyArea" class="hidden">

        <input type="text" id="healthFirma" placeholder="Firma Adı">

        <input type="number" id="healthCount" placeholder="Çalışan Sayısı">

        <h3 style="margin-top:20px;">Testler</h3>

        <label><input type="checkbox" value="100"> EKG</label><br>
        <label><input type="checkbox" value="110"> SFT</label><br>
        <label><input type="checkbox" value="100"> Oidio</label><br>
        <label><input type="checkbox" value="110"> Hemogram</label><br>
        <label><input type="checkbox" value="110"> Akciğer</label><br>
        <label><input type="checkbox" value="90"> TİT</label><br>
        <label><input type="checkbox" value="90"> AKŞ</label><br>
        <label><input type="checkbox" value="110"> Üre</label><br>
        <label><input type="checkbox" value="110"> Kreatinin</label><br>
        <label><input type="checkbox" value="110"> AST</label><br>
        <label><input type="checkbox" value="110"> ALT</label><br>
        <label><input type="checkbox" value="110"> HBS AG</label><br>
        <label><input type="checkbox" value="110"> Anti HBS</label><br>
        <label><input type="checkbox" value="110"> Anti HIV</label><br>
        <label><input type="checkbox" value="250"> Tetanoz</label><br>
        <label><input type="checkbox" value="400"> Portör</label><br>

        <button onclick="createCompanyHealthOffer()">
            Teklif Oluştur
        </button>

    </div>

    <div id="personArea" class="hidden">

        <input type="text" id="personName" placeholder="Ad Soyad">

        <h3 style="margin-top:20px;">Testler</h3>

        <label><input type="checkbox" class="personTest" value="100"> EKG</label><br>
        <label><input type="checkbox" class="personTest" value="110"> SFT</label><br>
        <label><input type="checkbox" class="personTest" value="100"> Oidio</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Hemogram</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Akciğer</label><br>
        <label><input type="checkbox" class="personTest" value="90"> TİT</label><br>
        <label><input type="checkbox" class="personTest" value="90"> AKŞ</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Üre</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Kreatinin</label><br>
        <label><input type="checkbox" class="personTest" value="110"> AST</label><br>
        <label><input type="checkbox" class="personTest" value="110"> ALT</label><br>
        <label><input type="checkbox" class="personTest" value="110"> HBS AG</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Anti HBS</label><br>
        <label><input type="checkbox" class="personTest" value="110"> Anti HIV</label><br>
        <label><input type="checkbox" class="personTest" value="250"> Tetanoz</label><br>
        <label><input type="checkbox" class="personTest" value="400"> Portör</label><br>

        <button onclick="createPersonOffer()">
            Şahıs Teklifi Oluştur
        </button>

    </div>

</div>

<div id="offerPreview" class="offer hidden"></div>

<button id="pdfButton" class="hidden" onclick="downloadPDF()">
PDF İndir
</button>

</div>

<script>

const mainType = document.getElementById("mainType");
const serviceArea = document.getElementById("serviceArea");
const healthArea = document.getElementById("healthArea");

mainType.addEventListener("change", function(){

    serviceArea.classList.add("hidden");
    healthArea.classList.add("hidden");

    if(this.value === "service"){
        serviceArea.classList.remove("hidden");
    }

    if(this.value === "health"){
        healthArea.classList.remove("hidden");
    }

});

document.getElementById("healthType").addEventListener("change", function(){

    document.getElementById("companyArea").classList.add("hidden");
    document.getElementById("personArea").classList.add("hidden");

    if(this.value === "company"){
        document.getElementById("companyArea").classList.remove("hidden");
    }

    if(this.value === "person"){
        document.getElementById("personArea").classList.remove("hidden");
    }

});

function createServiceOffer(){

    const firma = document.getElementById("serviceFirma").value;
    const danger = document.getElementById("dangerClass").value;
    const count = Number(document.getElementById("serviceCount").value);

    let base = 0;
    let extra = 0;

    let uzman = 0;
    let hekim = 0;

    let dangerText = "";

    if(danger === "az"){
        base = 2500;
        extra = 300;
        uzman = 10;
        hekim = 5;
        dangerText = "Az Tehlikeli";
    }

    if(danger === "tehlikeli"){
        base = 4000;
        extra = 500;
        uzman = 20;
        hekim = 10;
        dangerText = "Tehlikeli";
    }

    if(danger === "cok"){
        base = 5000;
        extra = 1000;
        uzman = 40;
        hekim = 15;
        dangerText = "Çok Tehlikeli";
    }

    let total = base;

    if(count > 5){
        total += (count - 5) * extra;
    }

    const uzmanSure = count * uzman;
    const hekimSure = count * hekim;

    const year = new Date().getFullYear();

    document.getElementById("offerPreview").innerHTML = `
        <h1>İŞ SAĞLIĞI VE GÜVENLİĞİ HİZMET TEKLİFİ</h1>

        <table>
            <tr>
                <th>Firma</th>
                <td>${firma}</td>
            </tr>

            <tr>
                <th>Tehlike Sınıfı</th>
                <td>${dangerText}</td>
            </tr>

            <tr>
                <th>Çalışan Sayısı</th>
                <td>${count}</td>
            </tr>

            <tr>
                <th>Uzman Süresi</th>
                <td>${uzmanSure} dk</td>
            </tr>

            <tr>
                <th>Hekim Süresi</th>
                <td>${hekimSure} dk</td>
            </tr>

            <tr>
                <th>Aylık Ücret</th>
                <td>${total} TL</td>
            </tr>

            <tr>
                <th>Geçerlilik</th>
                <td>31/12/${year}</td>
            </tr>
        </table>
    `;

    showPreview();

}

function createCompanyHealthOffer(){

    const firma = document.getElementById("healthFirma").value;
    const count = Number(document.getElementById("healthCount").value);

    const checked =
        document.querySelectorAll("#companyArea input[type=checkbox]:checked");

    const selectedCount = checked.length;

    let personPrice = 0;

    if(count < 10){

        if(selectedCount === 1) personPrice = 400;
        if(selectedCount === 2) personPrice = 500;
        if(selectedCount === 3) personPrice = 750;
        if(selectedCount === 4) personPrice = 900;
        if(selectedCount === 5) personPrice = 1000;
        if(selectedCount === 6) personPrice = 1150;
        if(selectedCount >= 7) personPrice = 1350;

    }else{

        checked.forEach(item=>{
            personPrice += Number(item.value);
        });

    }

    const total = personPrice * count;

    const date = new Date();

    date.setMonth(date.getMonth() + 1);

    const finalDate =
        date.toLocaleDateString("tr-TR");

    document.getElementById("offerPreview").innerHTML = `
        <h1>İŞ SAĞLIĞI VE GÜVENLİĞİ TAHLİL TEKLİFİ</h1>

        <table>

            <tr>
                <th>Firma</th>
                <td>${firma}</td>
            </tr>

            <tr>
                <th>Çalışan Sayısı</th>
                <td>${count}</td>
            </tr>

            <tr>
                <th>Kişi Başı Ücret</th>
                <td>${personPrice} TL</td>
            </tr>

            <tr>
                <th>Toplam Tutar</th>
                <td>${total} TL</td>
            </tr>

            <tr>
                <th>Geçerlilik</th>
                <td>${finalDate}</td>
            </tr>

        </table>
    `;

    showPreview();

}

function createPersonOffer(){

    const name =
        document.getElementById("personName").value;

    const checked =
        document.querySelectorAll(".personTest:checked");

    const selectedCount = checked.length;

    let total = 0;

    if(selectedCount === 1) total = 400;
    if(selectedCount === 2) total = 500;
    if(selectedCount === 3) total = 750;
    if(selectedCount === 4) total = 900;
    if(selectedCount === 5) total = 1000;
    if(selectedCount === 6) total = 1150;
    if(selectedCount === 7) total = 1350;

    if(selectedCount >= 8){

        checked.forEach(item=>{
            total += Number(item.value);
        });

    }

    const date = new Date();

    date.setMonth(date.getMonth() + 1);

    const finalDate =
        date.toLocaleDateString("tr-TR");

    document.getElementById("offerPreview").innerHTML = `
        <h1>ŞAHIS SAĞLIK TEKLİFİ</h1>

        <table>

            <tr>
                <th>Ad Soyad</th>
                <td>${name}</td>
            </tr>

            <tr>
                <th>Seçilen Test Sayısı</th>
                <td>${selectedCount}</td>
            </tr>

            <tr>
                <th>Toplam Tutar</th>
                <td>${total} TL</td>
            </tr>

            <tr>
                <th>Geçerlilik</th>
                <td>${finalDate}</td>
            </tr>

        </table>
    `;

    showPreview();

}

function showPreview(){

    document.getElementById("offerPreview")
        .classList.remove("hidden");

    document.getElementById("pdfButton")
        .classList.remove("hidden");

}

async function downloadPDF(){

    const element =
        document.getElementById("offerPreview");

    const canvas = await html2canvas(element,{
        scale:2
    });

    const imgData =
        canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf =
        new jsPDF("p","mm","a4");

    const pdfWidth =
        pdf.internal.pageSize.getWidth();

    const pdfHeight =
        (canvas.height * pdfWidth) / canvas.width;

    pdf.addImage(
        imgData,
        "PNG",
        0,
        0,
        pdfWidth,
        pdfHeight
    );

    pdf.save("teklif.pdf");

}

</script>

</body>
</html>
